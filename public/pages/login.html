<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
    <link rel="stylesheet" href="./CSS/todos.css" />
    <link rel="stylesheet" href="./CSS/estiloCadastro.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./CSS/estiloLogin.css">
  </head>

  <body>
    <div class="cabecalho transparente">
      <div class="left">
        <p>Minha Jornada</p>
      </div>
      <div class="center">
        <a href="./index.html#principal">Início</a>
        <a href="./index.html#sobre">Sobre</a>
        <a href="#">Veja a Sua</a>
      </div>
      <div class="right">
        <a href="./login.html">Login</a>
      </div>
    </div>

    <div class="container">
      <div class="box">
        <div class="left-container">
          <img src="" alt="" />
        </div>
        <div class="right-container">
          <div class="box-right">
            <div class="cabecalho-container">
              <h1>Entre na sua conta</h1>
              <p>Não possui uma conta? <a href="./cadastro.html">Cadastre-se</a></p>
            </div>
            <div class="inputs-container">
              <label for="email">Email</label>
              <input placeholder="seuemail@exemplo.com" type="text" id="name" />
              <label for="name">Senha</label>
              <input placeholder="*********" type="password" id="name" />
            </div>
            <div class="botao-cadastrar">
              <button id="entrar">Entrar <i class="fa-solid fa-arrow-right"></i></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

<script src="./JS/header.js"></script>
<script>
    document.getElementById('entrar').addEventListener('click', () => {
        window.location = './index.html'
    })
</script>
