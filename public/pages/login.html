<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
    <link rel="stylesheet" href="./CSS/todos.css" />
    <link rel="stylesheet" href="./CSS/estiloCadastro.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./CSS/estiloLogin.css" />
    <link rel="shortcut icon" href="./img/icone2.jpg" type="image/x-icon" />
  </head>

  <body>
    <div class="container">
      <div class="box">
        <div class="left-container">
          <img src="" alt="" />
        </div>
        <div class="right-container">
          <div class="box-right">
            <div class="cabecalho-container">
              <h1>Entre na sua conta</h1>
              <p>
                Não possui uma conta? <a href="./cadastro.html">Cadastre-se</a>
              </p>
            </div>
            <div class="inputs-container">
              <label for="email">Email:</label>
              <input
                placeholder="seuemail@exemplo.com"
                type="text"
                id="ipt_email"
              />
              <label for="senha">Senha:</label>
              <input placeholder="*********" type="password" id="ipt_senha" />
              <span
                id="erroDiv"
                style="
                  color: red;
                  font-weight: bold;
                  align-self: center;
                  display: none;
                "
                >Email ou senha incorretos</span
              >
              <img
                id="carregando"
                style="align-self: center; margin-top: 0.5em; display: none"
                height="50"
                width="50"
                src="./img/carregando.gif"
                alt=""
              />
            </div>
            <div class="botao-cadastrar">
              <button onclick="entrar()" id="entrar">
                Entrar <i class="fa-solid fa-arrow-right"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

<script>
  function entrar() {
    var emailVar = ipt_email.value;
    var senhaVar = ipt_senha.value;

    if (
      emailVar == "" ||
      senhaVar == "" ||
      emailVar == undefined ||
      senhaVar == undefined
    ) {
      erroDiv.style.display = "block";
      setTimeout(sumirMensagem, 2000);
      return false;
    }

    fetch("/usuarios/autenticar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        emailServer: emailVar,
        senhaServer: senhaVar,
      }),
    })
      .then(function (resposta) {
        console.log("ESTOU NO THEN DO entrar()!");

        if (resposta.ok) {
          console.log(resposta);

          resposta.json().then((json) => {
            console.log(json);
            console.log(JSON.stringify(json));
            sessionStorage.EMAIL_USUARIO = json.email;
            sessionStorage.NOME_USUARIO = json.nome;
            sessionStorage.ID_USUARIO = json.idusuario;

            carregando.style.display = "block";

            setTimeout(() => (window.location = "./dashboard.html"), 2000);
          });
        } else {
          console.log("Houve um erro ao tentar realizar o login!");
          erroDiv.style.display = "block";
          setTimeout(sumirMensagem, 2000);

          resposta.text().then((texto) => {
            console.error(texto);
          });
        }
      })
      .catch(function (erro) {
        console.log(erro);
      });

    return false;
  }

  function sumirMensagem() {
    erroDiv.style.display = "none";
  }
</script>
