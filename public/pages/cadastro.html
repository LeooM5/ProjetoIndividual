<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
    <link rel="stylesheet" href="./CSS/todos.css" />
    <link rel="stylesheet" href="./CSS/estiloCadastro.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="shortcut icon" href="./img/icone.svg" type="image/x-icon" />
  </head>

  <body>
    <div id="atencaoCard" class="card-atencao">
      <h2 id="atencao"></h2>
    </div>

    <div class="container">
      <div class="box">
        <div class="left-container">
          <img src="" alt="" />
        </div>
        <div class="right-container">
          <div class="box-right">
            <div class="cabecalho-container">
              <h1>Crie sua conta</h1>
              <p>Já possui uma conta? <a href="./login.html">Entre</a></p>
            </div>
            <div class="inputs-container">
              <label for="nomeCompleto">Nome Completo</label>
              <input
                placeholder="Seu Nome Aqui"
                type="text"
                id="nomeCompleto"
              />
              <label for="email">Email</label>
              <input
                placeholder="seuemail@exemplo.com"
                type="text"
                id="email"
              />
              <div class="senha-maior">
                <div class="senha-menor">
                  <label for="senha">Senha</label>
                  <input placeholder="*********" type="password" id="senha" />
                </div>
                <div class="confirmar-senha-menor">
                  <label for="confirmar_senha">Confirmar Senha</label>
                  <input
                    placeholder="*********"
                    type="password"
                    id="confirmar_senha"
                  />
                </div>
              </div>
              <span
                id="divERROOO"
                style="
                  color: red;
                  text-align: center;
                  opacity: 0;
                  transition: 0.3s;
                "
              ></span>
            </div>
            <div class="botao-cadastrar">
              <button onclick="cadastrar()">
                Criar conta <i class="fa-solid fa-arrow-right"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

<script>
  function cadastrar() {
    let ipt_name = nomeCompleto.value;
    let ipt_email = email.value;
    let ipt_senha = senha.value;
    let ipt_senhaConfirmar = confirmar_senha.value;

    let caixaAtencao = atencaoCard;

    let retornoDaFuncaoVerificacoes = verificacoes(
      ipt_name,
      ipt_email,
      ipt_senha,
      ipt_senhaConfirmar,
    );

    if (retornoDaFuncaoVerificacoes == true) {
      fetch("/usuarios/cadastrar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          // crie um atributo que recebe o valor recuperado aqui
          // Agora vá para o arquivo routes/usuario.js
          nomeServer: ipt_name,
          emailServer: ipt_email,
          senhaServer: ipt_senha,
        }),
      })
        .then(function (resposta) {
          console.log("resposta: ", resposta);

          if (resposta.ok) {
            window.location = "./login.html";
          } else if (resposta.status == 409) {
            divERROOO.innerHTML = "Este email já está em uso!";
            divERROOO.style.opacity = 1;
          } else {
            throw "Houve um erro ao tentar realizar o cadastro!";
          }
        })
        .catch(function (resposta) {
          console.log(`#ERRO: ${resposta}`);
        });

      return false;
    } else {
      atencao.innerHTML = retornoDaFuncaoVerificacoes;
      caixaAtencao.style.opacity = 1;
      setTimeout(() => {
        caixaAtencao.style.opacity = 0;
      }, 2000);
    }
  }

  function verificacoes(nome, email, senha, confirmacao) {
    let senhaVetor = senha.split("");
    let criterioEspecial = 0;

    let temMaius = senha != senha.toLowerCase();
    let temMinus = senha != senha.toUpperCase();

    for (let i = 0; i < senhaVetor.length; i++) {
      if (
        senhaVetor[i] < "0" ||
        (senhaVetor[i] > "9" && senhaVetor[i] < "A") ||
        (senhaVetor[i] > "Z" && senhaVetor[i] < "a") ||
        senhaVetor[i] > "z"
      ) {
        criterioEspecial++;
      }
    }

    if (nome.length < 3) {
      return `Você deve inserir seu nome!`;
    } else if (!(email.includes("@") && email.endsWith(".com"))) {
      return `O email deve ser válido!`;
    } else if (senha.length < 6) {
      return `A senha deve possuir pelo menos 6 caracteres!`;
    } else if (!temMaius) {
      return `A senha deve conter caractere maiúsculo!`;
    } else if (!temMinus) {
      return `A senha deve conter caractere minúsculo!`;
    } else if (criterioEspecial <= 0) {
      return `A senha deve conter caractere especial!`;
    } else if (senha != confirmacao) {
      return `As senhas não coincidem`;
    }

    return true;
  }
</script>
